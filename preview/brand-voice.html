<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:22px 28px;">
  <div style="font-family:var(--font-serif);font-size:24px;font-weight:400;letter-spacing:-0.015em;color:var(--ink-800);line-height:1.25;">
    A library card catalog,<br>redesigned for software.
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:16px;">
    <div>
      <div style="font-family:var(--font-sans);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#5b7f50;font-weight:500;margin-bottom:6px;">DO</div>
      <ul style="margin:0;padding-left:16px;font-family:var(--font-sans);font-size:13px;color:var(--ink-700);line-height:1.55;">
        <li>Sentence case headings</li>
        <li>"Start a new chat"</li>
        <li>Em-dash as a breath — like this</li>
        <li>Confident understatement</li>
      </ul>
    </div>
    <div>
      <div style="font-family:var(--font-sans);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#b04a3a;font-weight:500;margin-bottom:6px;">DON'T</div>
      <ul style="margin:0;padding-left:16px;font-family:var(--font-sans);font-size:13px;color:var(--ink-700);line-height:1.55;">
        <li>Title Case Headings</li>
        <li>"🚀 Click Here Now!"</li>
        <li>Emoji, anywhere</li>
        <li>Exclamation marks</li>
      </ul>
    </div>
  </div>
</body></html>
