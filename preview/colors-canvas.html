<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-row" style="gap:12px;">
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#faf9f5;"></div>
      <div class="swatch-name">Canvas</div>
      <div class="swatch-hex">#faf9f5 · primary surface</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#f4f3ee;"></div>
      <div class="swatch-name">Canvas Soft</div>
      <div class="swatch-hex">#f4f3ee · secondary</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#ecebe3;"></div>
      <div class="swatch-name">Canvas Sunk</div>
      <div class="swatch-hex">#ecebe3 · code wells</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#ffffff; border:1px solid var(--border);"></div>
      <div class="swatch-name">Paper</div>
      <div class="swatch-hex">#ffffff · sparing</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#181715;"></div>
      <div class="swatch-name" >Ink Surface</div>
      <div class="swatch-hex">#181715 · footer</div>
    </div>
  </div>
</body></html>
