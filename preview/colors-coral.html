<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns:repeat(9,1fr); gap:8px;">
    <div class="swatch"><div class="swatch-chip" style="background:#f8ece7;height:48px;"></div><div class="swatch-name">50</div><div class="swatch-hex">f8ece7</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#edcdbf;height:48px;"></div><div class="swatch-name">100</div><div class="swatch-hex">edcdbf</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#e2ae97;height:48px;"></div><div class="swatch-name">200</div><div class="swatch-hex">e2ae97</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#d88e6f;height:48px;"></div><div class="swatch-name">300</div><div class="swatch-hex">d88e6f</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#cd6f47;height:48px;"></div><div class="swatch-name">400</div><div class="swatch-hex">cd6f47</div></div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#cc785c;height:48px;outline:2px solid var(--ink-800);outline-offset:2px;"></div>
      <div class="swatch-name">500 ★</div><div class="swatch-hex">cc785c</div>
    </div>
    <div class="swatch"><div class="swatch-chip" style="background:#b05730;height:48px;"></div><div class="swatch-name">600</div><div class="swatch-hex">b05730</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#884325;height:48px;"></div><div class="swatch-name">700</div><div class="swatch-hex">884325</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#602f1a;height:48px;"></div><div class="swatch-name">800</div><div class="swatch-hex">602f1a</div></div>
  </div>
  <div style="margin-top:16px;font-family:var(--font-sans);font-size:12px;color:var(--ink-600);">
    <strong style="color:var(--ink-800);font-weight:500;">500</strong> is the primary accent — buttons, links, focus.
    <strong style="color:var(--ink-800);font-weight:500;margin-left:14px;">600 / 700</strong> for hover and press.
  </div>
</body></html>
