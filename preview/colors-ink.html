<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns:repeat(9,1fr); gap:8px;">
    <div class="swatch"><div class="swatch-chip" style="background:#f1efe7;height:48px;"></div><div class="swatch-name">100</div><div class="swatch-hex">f1efe7</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#e7e4db;height:48px;"></div><div class="swatch-name">200</div><div class="swatch-hex">e7e4db</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#d6d3ca;height:48px;"></div><div class="swatch-name">300</div><div class="swatch-hex">d6d3ca</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#b1ada1;height:48px;"></div><div class="swatch-name">400</div><div class="swatch-hex">b1ada1</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#7a7268;height:48px;"></div><div class="swatch-name">500</div><div class="swatch-hex">7a7268</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#5a554d;height:48px;"></div><div class="swatch-name">600</div><div class="swatch-hex">5a554d</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#3d3a35;height:48px;"></div><div class="swatch-name">700</div><div class="swatch-hex">3d3a35</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#2c2b27;height:48px;"></div><div class="swatch-name">800</div><div class="swatch-hex">2c2b27</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#181715;height:48px;"></div><div class="swatch-name">900</div><div class="swatch-hex">181715</div></div>
  </div>
  <div style="margin-top:16px;font-family:var(--font-sans);font-size:12px;color:var(--ink-600);">
    <strong style="color:var(--ink-800);font-weight:500;">700–800</strong> = body & headings.
    <strong style="color:var(--ink-800);font-weight:500;margin-left:14px;">300</strong> = hairline borders.
    <strong style="color:var(--ink-800);font-weight:500;margin-left:14px;">400 (Cloudy)</strong> = disabled.
  </div>
</body></html>
