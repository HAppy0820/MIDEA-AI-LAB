<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-row" style="gap:12px;">
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#5b7f50;"></div>
      <div class="swatch-name">Success</div><div class="swatch-hex">#5b7f50 · sage green</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#c89548;"></div>
      <div class="swatch-name">Warning</div><div class="swatch-hex">#c89548 · ochre</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#b04a3a;"></div>
      <div class="swatch-name">Danger</div><div class="swatch-hex">#b04a3a · brick</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#5a7a8c;"></div>
      <div class="swatch-name">Info</div><div class="swatch-hex">#5a7a8c · slate-blue</div>
    </div>
  </div>
  <p style="font-family:var(--font-sans); font-size:12px; color:var(--ink-600); margin:14px 0 0;">
    All semantic colors are pulled toward the warm-earthy direction so they sit naturally on the cream canvas.
  </p>
</body></html>
