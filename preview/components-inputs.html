<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:22px 32px;">
  <style>
    .field { display:flex; flex-direction:column; gap:6px; flex:1; }
    .field label { font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--ink-700);}
    .field input, .field textarea { font-family:var(--font-sans); font-size:14px; color:var(--ink-800); padding:10px 12px; background:var(--paper); border:1px solid var(--border); border-radius:8px; outline:none; transition:all 120ms; }
    .field input:focus { border-color:var(--coral-500); box-shadow: 0 0 0 4px rgba(204,120,92,0.15); }
    .field-hint { font-family:var(--font-sans); font-size:11px; color:var(--ink-500);}
  </style>
  <div style="display:flex; gap:14px; align-items:flex-start;">
    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="you@company.com">
    </div>
    <div class="field">
      <label>API key</label>
      <input type="text" value="sk-ant-…" style="font-family:var(--font-mono);font-size:13px; border-color:var(--coral-500); box-shadow: 0 0 0 4px rgba(204,120,92,0.15);">
      <div class="field-hint">Focused state</div>
    </div>
    <div class="field">
      <label>Org</label>
      <input type="text" value="Acme, Inc." disabled style="background:var(--canvas-soft); color:var(--ink-500); cursor:not-allowed;">
      <div class="field-hint">Disabled</div>
    </div>
  </div>
  <div style="margin-top:14px;">
    <div class="field">
      <label>Message</label>
      <textarea rows="2" placeholder="Ask Claude anything…" style="resize:none;"></textarea>
    </div>
  </div>
</body></html>
