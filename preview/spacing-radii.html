<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap:14px; align-items:flex-end;">
    <div style="text-align:center;">
      <div style="width:80px;height:64px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:4px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">xs · 4</div>
    </div>
    <div style="text-align:center;">
      <div style="width:80px;height:64px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:6px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">sm · 6</div>
    </div>
    <div style="text-align:center;">
      <div style="width:80px;height:64px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:8px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">md · 8 (buttons)</div>
    </div>
    <div style="text-align:center;">
      <div style="width:80px;height:64px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:12px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">lg · 12 (cards)</div>
    </div>
    <div style="text-align:center;">
      <div style="width:80px;height:64px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:16px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">xl · 16</div>
    </div>
    <div style="text-align:center;">
      <div style="width:80px;height:64px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:24px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">2xl · 24</div>
    </div>
    <div style="text-align:center;">
      <div style="width:80px;height:32px;background:var(--canvas-soft);border:1px solid var(--border);border-radius:999px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;">pill (chips)</div>
    </div>
  </div>
</body></html>
