<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:36px 32px;">
  <div style="display:flex; gap:24px;">
    <div style="text-align:center;">
      <div style="width:120px;height:78px;background:var(--paper);border:1px solid var(--border-faint);border-radius:8px;box-shadow:0 1px 2px rgba(45,40,30,0.04);"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:8px;">xs</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px;height:78px;background:var(--paper);border:1px solid var(--border-faint);border-radius:8px;box-shadow:0 1px 3px rgba(45,40,30,0.06), 0 1px 2px rgba(45,40,30,0.04);"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:8px;">sm</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px;height:78px;background:var(--paper);border:1px solid var(--border-faint);border-radius:8px;box-shadow:0 4px 12px rgba(45,40,30,0.06), 0 1px 3px rgba(45,40,30,0.05);"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:8px;">md (hover)</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px;height:78px;background:var(--paper);border:1px solid var(--border-faint);border-radius:8px;box-shadow:0 12px 32px rgba(45,40,30,0.08), 0 2px 6px rgba(45,40,30,0.05);"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:8px;">lg (modals)</div>
    </div>
  </div>
  <div style="margin-top:18px;font-family:var(--font-sans);font-size:12px;color:var(--ink-600);">
    Shadows tinted <code style="font-family:var(--font-mono);background:var(--bg-sunk);padding:1px 5px;border-radius:3px;font-size:11px;">rgba(45, 40, 30, x)</code> — warm, not pure black.
  </div>
</body></html>
