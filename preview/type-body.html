<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 32px;">
  <div class="eyebrow">Body — Sans</div>
  <p style="font-family:var(--font-sans); font-size:18px; line-height:1.6; color:var(--ink-800); max-width:62ch; margin:0 0 12px;">
    Claude is a calm collaborator. The body sans is rounded, humanist, and sized larger than typical web body — it invites reading.
  </p>
  <p style="font-family:var(--font-sans); font-size:14px; line-height:1.55; color:var(--ink-600); margin:0;">
    Smaller copy uses the same family at <code style="font-family:var(--font-mono);background:var(--bg-sunk);padding:1px 5px;border-radius:3px;font-size:12px;">14px / 1.55</code> for captions, secondary text, and supporting UI.
  </p>
  <div style="margin-top:14px; display:flex; gap:18px; font-family:var(--font-mono); font-size:11px; color:var(--ink-500);">
    <span>DM Sans → Styrene B</span>
    <span>weights 400 / 500 / 700</span>
  </div>
</body></html>
