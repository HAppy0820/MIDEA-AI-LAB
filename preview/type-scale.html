<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:22px 32px;">
  <div style="display:grid; grid-template-columns: 90px 1fr; row-gap:14px; column-gap:18px; align-items:baseline;">

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">64 / 400</div>
    <div style="font-family:var(--font-serif);font-size:54px;line-height:1.05;letter-spacing:-0.02em;color:var(--ink-800);">Display</div>

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">40 / 400</div>
    <div style="font-family:var(--font-serif);font-size:36px;line-height:1.1;letter-spacing:-0.02em;color:var(--ink-800);">Heading 1</div>

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">28 / 400</div>
    <div style="font-family:var(--font-serif);font-size:26px;line-height:1.2;letter-spacing:-0.015em;color:var(--ink-800);">Heading 2</div>

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">20 / 500</div>
    <div style="font-family:var(--font-sans);font-size:18px;line-height:1.3;color:var(--ink-800);font-weight:500;">Heading 3 / Subhead</div>

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">16 / 400</div>
    <div style="font-family:var(--font-sans);font-size:16px;line-height:1.6;color:var(--ink-700);">Body — most reading sits here.</div>

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">14 / 400</div>
    <div style="font-family:var(--font-sans);font-size:14px;line-height:1.55;color:var(--ink-600);">Small body — secondary, captions.</div>

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);">11 / 500</div>
    <div style="font-family:var(--font-sans);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-500);font-weight:500;">EYEBROW · TRACKED LABEL</div>

  </div>
</body></html>
