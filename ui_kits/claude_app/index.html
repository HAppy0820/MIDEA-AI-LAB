<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { background: var(--canvas); color: var(--ink-800); overflow: hidden;}
  #root { height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
  .sidebar { background: var(--canvas-soft); border-right: 1px solid var(--border-faint); display: flex; flex-direction: column; padding: 14px 12px; gap: 14px;}
  .main { display: flex; flex-direction: column; height: 100vh; position: relative;}

  /* Sidebar */
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 2px; color: var(--ink-800);}
  .brand svg { color: var(--coral-500); }
  .brand-name { font-family: var(--font-serif); font-size: 22px; font-weight: 400; letter-spacing: -0.015em; }
  .new-chat { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--border); border-radius: 8px; background: var(--canvas); color: var(--ink-800); font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 120ms;}
  .new-chat:hover { background: var(--paper); border-color: var(--border-strong); }
  .nav { display:flex; flex-direction:column; gap:2px; padding-top: 4px;}
  .nav-section-label { font-family: var(--font-sans); font-size: 10px; letter-spacing:0.1em; text-transform: uppercase; color: var(--ink-500); padding: 8px 12px 4px; font-weight: 500;}
  .nav-item { display:flex; align-items:center; gap:10px; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-family: var(--font-sans); font-size: 13px; color: var(--ink-700); line-height: 1.3; transition: background 120ms; user-select:none;}
  .nav-item:hover { background: var(--ink-200); }
  .nav-item.active { background: var(--ink-200); color: var(--ink-800); }
  .nav-item svg { color: var(--ink-500); flex-shrink: 0; }
  .nav-item-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-footer { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border-faint); }
  .account-row { display:flex; align-items:center; gap:10px; padding: 8px; border-radius: 8px; cursor: pointer; }
  .account-row:hover { background: var(--ink-200); }
  .avatar { width: 28px; height: 28px; border-radius: 999px; background: var(--coral-500); color: var(--canvas); display:flex; align-items:center; justify-content:center; font-family: var(--font-sans); font-size: 12px; font-weight:600;}
  .account-name { font-family: var(--font-sans); font-size: 13px; color: var(--ink-800); font-weight: 500; }
  .account-plan { font-family: var(--font-sans); font-size: 11px; color: var(--ink-500); }

  /* Main */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding: 14px 22px; height: 56px; flex-shrink: 0;}
  .model-pill { display:inline-flex; align-items:center; gap:6px; padding: 6px 11px 6px 12px; border:1px solid var(--border); border-radius: 999px; font-family: var(--font-sans); font-size: 12px; color: var(--ink-700); background: var(--canvas); cursor: pointer; }
  .model-pill:hover { background: var(--canvas-soft); }
  .top-actions { display:flex; align-items:center; gap: 4px;}
  .icon-btn { width: 34px; height: 34px; display:flex; align-items:center; justify-content:center; border-radius: 8px; cursor: pointer; color: var(--ink-700); transition: all 120ms; background: transparent; border: 0;}
  .icon-btn:hover { background: var(--canvas-soft); }

  .stream { flex: 1; overflow-y: auto; padding: 8px 24px 16px; }
  .stream-inner { max-width: 740px; margin: 0 auto; }

  /* Welcome state */
  .welcome { padding-top: 12vh; text-align: center; }
  .welcome-mark { color: var(--coral-500); margin: 0 auto 18px; }
  .welcome-greeting { font-family: var(--font-serif); font-size: 38px; font-weight: 400; letter-spacing: -0.02em; color: var(--ink-800); margin: 0 0 6px;}
  .welcome-greeting .greeting-name { color: var(--coral-500); font-style: italic; }
  .welcome-sub { font-family: var(--font-sans); font-size: 15px; color: var(--ink-600); margin: 0 0 28px;}
  .starters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 680px; margin: 0 auto;}
  .starter { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; text-align:left; cursor: pointer; transition: all 220ms cubic-bezier(0.22, 0.61, 0.36, 1); display:flex; align-items:flex-start; gap: 12px;}
  .starter:hover { border-color: var(--border-strong); box-shadow: 0 4px 12px rgba(45,40,30,0.06), 0 1px 3px rgba(45,40,30,0.05);}
  .starter-icon { color: var(--coral-500); flex-shrink: 0; margin-top: 2px;}
  .starter-title { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--ink-800); margin-bottom: 3px;}
  .starter-sub { font-family: var(--font-sans); font-size: 12px; color: var(--ink-600); line-height: 1.4;}

  /* Turns */
  .turn { padding: 18px 0; }
  .turn-user { display: flex; justify-content: flex-end; }
  .user-bubble { background: var(--canvas-soft); border: 1px solid var(--border-faint); border-radius: 18px; padding: 11px 16px; max-width: 70%; font-family: var(--font-sans); font-size: 15px; line-height: 1.55; color: var(--ink-800); white-space: pre-wrap;}
  .turn-claude { display: flex; gap: 14px; align-items: flex-start;}
  .claude-mark-wrap { width:28px; height:28px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color: var(--coral-500); margin-top: 1px;}
  .claude-body { font-family: var(--font-sans); font-size: 15px; line-height: 1.65; color: var(--ink-800); flex: 1; padding-top: 2px;}
  .claude-body p { margin: 0 0 0.85em; max-width: none; }
  .claude-body p:last-child { margin-bottom: 0; }
  .cursor-blink { display:inline-block; width: 7px; height: 16px; background: var(--coral-500); vertical-align: -2px; margin-left: 2px; animation: blink 1s infinite step-end; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Composer */
  .composer-wrap { padding: 0 24px 22px; flex-shrink: 0;}
  .composer { max-width: 740px; margin: 0 auto; background: var(--paper); border: 1px solid var(--border); border-radius: 18px; padding: 12px 14px 10px; transition: all 120ms; box-shadow: 0 1px 2px rgba(45,40,30,0.04);}
  .composer:focus-within { border-color: var(--ink-400); box-shadow: 0 4px 12px rgba(45,40,30,0.06), 0 1px 3px rgba(45,40,30,0.05);}
  .composer textarea { width: 100%; border: 0; outline: 0; resize: none; background: transparent; font-family: var(--font-sans); font-size: 15px; line-height: 1.55; color: var(--ink-800); padding: 4px 4px 6px; max-height: 200px; }
  .composer textarea::placeholder { color: var(--ink-500); }
  .composer-actions { display:flex; align-items:center; justify-content: space-between; padding: 4px 2px 0;}
  .composer-left { display:flex; gap: 4px; align-items:center;}
  .composer-right { display:flex; gap: 6px; align-items:center;}
  .send-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--coral-500); color: var(--canvas); display:flex; align-items:center; justify-content:center; cursor:pointer; border: 0; transition: all 120ms; box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);}
  .send-btn:hover { background: var(--coral-600); }
  .send-btn:disabled { background: var(--ink-300); cursor: not-allowed; }
  .footnote { text-align: center; font-family: var(--font-sans); font-size: 11px; color: var(--ink-500); margin-top: 10px;}

  /* Scrollbar */
  .stream::-webkit-scrollbar { width: 10px; }
  .stream::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; border: 2px solid var(--canvas);}
  .stream::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18.3.1 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
  const { useState, useRef, useEffect } = React;

  /* ────────────── Icons (Lucide, inlined) ────────────── */
  const Icon = ({d, size = 18, ...props}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"
      dangerouslySetInnerHTML={{__html: d}} {...props} />
  );
  const IconPlus     = (p) => <Icon {...p} d='<path d="M12 5v14M5 12h14"/>'/>;
  const IconSearch   = (p) => <Icon {...p} d='<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>'/>;
  const IconHistory  = (p) => <Icon {...p} d='<path d="M12 20.94A8 8 0 1 0 4.06 13"/><path d="M12 8v4l3 3"/><path d="M3 3v5h5"/>'/>;
  const IconBookmark = (p) => <Icon {...p} d='<path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>'/>;
  const IconFolder   = (p) => <Icon {...p} d='<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>'/>;
  const IconChevDown = (p) => <Icon {...p} d='<path d="m6 9 6 6 6-6"/>'/>;
  const IconPaperclip= (p) => <Icon {...p} d='<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>'/>;
  const IconMic      = (p) => <Icon {...p} d='<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/>'/>;
  const IconArrowUp  = (p) => <Icon {...p} d='<path d="M12 19V5M5 12l7-7 7 7"/>'/>;
  const IconWand     = (p) => <Icon {...p} d='<path d="M15 4V2M15 10v-2M11 6H9M21 6h-2M18 9l-1.5-1.5M18 3l-1.5 1.5M3 21l9-9M12 14l1 1"/>'/>;
  const IconCode     = (p) => <Icon {...p} d='<path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/>'/>;
  const IconBook     = (p) => <Icon {...p} d='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'/>;
  const IconLeaf     = (p) => <Icon {...p} d='<path d="M11 20A7 7 0 0 1 4 13c0-2.5 2-7 7-9 5 2 7 6.5 7 9a7 7 0 0 1-7 7z"/><path d="M11 20v-9"/>'/>;
  const IconSettings = (p) => <Icon {...p} d='<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>'/>;

  const ClaudeMark = ({size = 22}) => (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="currentColor">
      <path d="M32 4 L34.6 26.2 L56.8 22.4 L37.4 32 L56.8 41.6 L34.6 37.8 L32 60 L29.4 37.8 L7.2 41.6 L26.6 32 L7.2 22.4 L29.4 26.2 Z"/>
    </svg>
  );

  /* ────────────── Sidebar ────────────── */
  function Sidebar({recents, activeId, onSelect, onNew}) {
    return (
      <aside className="sidebar">
        <div className="brand">
          <ClaudeMark size={24}/>
          <span className="brand-name">Claude</span>
        </div>
        <button className="new-chat" onClick={onNew}>
          <IconPlus size={16}/> New chat
        </button>
        <nav className="nav">
          <div className="nav-item"><IconSearch size={16}/> <span className="nav-item-text">Search</span></div>
          <div className="nav-item"><IconBookmark size={16}/> <span className="nav-item-text">Starred</span></div>
          <div className="nav-item"><IconFolder size={16}/> <span className="nav-item-text">Projects</span></div>
        </nav>
        <div className="nav-section-label">Recents</div>
        <nav className="nav" style={{flex:1, overflowY:'auto'}}>
          {recents.map(r => (
            <div key={r.id}
                 className={`nav-item${activeId === r.id ? ' active' : ''}`}
                 onClick={() => onSelect(r.id)}>
              <span className="nav-item-text">{r.title}</span>
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="account-row">
            <div className="avatar">M</div>
            <div style={{flex:1}}>
              <div className="account-name">Midea AI</div>
              <div className="account-plan">Team plan</div>
            </div>
            <IconSettings size={16} style={{color:'var(--ink-500)'}}/>
          </div>
        </div>
      </aside>
    );
  }

  /* ────────────── Topbar ────────────── */
  function Topbar() {
    return (
      <div className="topbar">
        <button className="model-pill">
          Claude Sonnet 4.5 <IconChevDown size={13}/>
        </button>
        <div className="top-actions">
          <button className="icon-btn" aria-label="History"><IconHistory size={18}/></button>
          <button className="icon-btn" aria-label="Settings"><IconSettings size={18}/></button>
        </div>
      </div>
    );
  }

  /* ────────────── Welcome / starters ────────────── */
  const STARTERS = [
    {icon: IconWand,   title: "Draft a product description", sub: "Cross-border listing copy in three voices."},
    {icon: IconBook,   title: "Summarize this week's AI news", sub: "Five stories, one paragraph each."},
    {icon: IconCode,   title: "Build a small React component", sub: "Hover-to-reveal product tooltip card."},
    {icon: IconLeaf,   title: "Compare two embedding models", sub: "Recall, latency, cost on retail queries."},
  ];

  function Welcome({onStart}) {
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    return (
      <div className="welcome">
        <div className="welcome-mark"><ClaudeMark size={42}/></div>
        <h1 className="welcome-greeting">
          {greet}, <span className="greeting-name">Mei</span>
        </h1>
        <p className="welcome-sub">How can I help you today?</p>
        <div className="starters">
          {STARTERS.map((s, i) => {
            const I = s.icon;
            return (
              <button key={i} className="starter" onClick={() => onStart(s.title)}>
                <span className="starter-icon"><I size={18}/></span>
                <span>
                  <div className="starter-title">{s.title}</div>
                  <div className="starter-sub">{s.sub}</div>
                </span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  /* ────────────── Turn renderers ────────────── */
  function UserTurn({text}) {
    return <div className="turn turn-user"><div className="user-bubble">{text}</div></div>;
  }
  function ClaudeTurn({text, streaming}) {
    return (
      <div className="turn turn-claude">
        <div className="claude-mark-wrap"><ClaudeMark size={20}/></div>
        <div className="claude-body">
          {text.split('\n\n').map((p, i, arr) => (
            <p key={i}>
              {p}
              {streaming && i === arr.length - 1 && <span className="cursor-blink"/>}
            </p>
          ))}
        </div>
      </div>
    );
  }

  /* ────────────── Composer ────────────── */
  function Composer({onSend, disabled}) {
    const [val, setVal] = useState('');
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      ref.current.style.height = 'auto';
      ref.current.style.height = ref.current.scrollHeight + 'px';
    }, [val]);
    const submit = () => {
      const t = val.trim();
      if (!t || disabled) return;
      onSend(t);
      setVal('');
    };
    return (
      <div className="composer-wrap">
        <div className="composer">
          <textarea
            ref={ref}
            rows={1}
            placeholder="Reply to Claude…"
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submit();
              }
            }}
          />
          <div className="composer-actions">
            <div className="composer-left">
              <button className="icon-btn" aria-label="Attach"><IconPaperclip size={17}/></button>
              <button className="icon-btn" aria-label="Voice"><IconMic size={17}/></button>
            </div>
            <div className="composer-right">
              <button className="model-pill" style={{padding:'4px 9px',fontSize:'11px'}}>
                Sonnet 4.5 <IconChevDown size={11}/>
              </button>
              <button className="send-btn" onClick={submit} disabled={!val.trim() || disabled} aria-label="Send">
                <IconArrowUp size={16}/>
              </button>
            </div>
          </div>
        </div>
        <div className="footnote">Claude can make mistakes. Please double-check responses.</div>
      </div>
    );
  }

  /* ────────────── App shell ────────────── */
  const FAKE_REPLY = `That's a good question — let me think through it carefully.

The shift from rule-based systems to learned representations was the key turn. Once models could form their own internal vocabulary from raw data, the kinds of problems we could attack expanded by an order of magnitude almost overnight.

For e-commerce specifically, three areas are seeing the largest near-term lift: search relevance from embeddings, dynamic listing generation, and conversational customer support that finally feels useful rather than scripted.`;

  const RECENTS_INIT = [
    {id: 1, title: "Cross-border listing rewrite — DE/JP", history: []},
    {id: 2, title: "Embeddings for fuzzy SKU search", history: []},
    {id: 3, title: "Brief: AI weekly · May 5", history: []},
    {id: 4, title: "Hero copy for Midea storefront", history: []},
  ];

  function App() {
    const [recents] = useState(RECENTS_INIT);
    const [activeId, setActiveId] = useState(null);
    const [turns, setTurns] = useState([]); // {role, text, streaming?}
    const streamRef = useRef(null);

    useEffect(() => {
      if (streamRef.current) streamRef.current.scrollTop = streamRef.current.scrollHeight;
    }, [turns]);

    const sendMessage = (text) => {
      setTurns(t => [...t, {role: 'user', text}]);
      // simulate Claude responding with a fake stream
      setTimeout(() => {
        setTurns(t => [...t, {role: 'claude', text: '', streaming: true}]);
        let i = 0;
        const tick = () => {
          i += Math.max(2, Math.floor(Math.random() * 6));
          setTurns(t => {
            const copy = [...t];
            const last = copy[copy.length - 1];
            if (!last || last.role !== 'claude') return copy;
            copy[copy.length - 1] = {...last, text: FAKE_REPLY.slice(0, i)};
            return copy;
          });
          if (i < FAKE_REPLY.length) {
            setTimeout(tick, 22);
          } else {
            setTurns(t => {
              const copy = [...t];
              copy[copy.length - 1] = {...copy[copy.length - 1], streaming: false};
              return copy;
            });
          }
        };
        tick();
      }, 350);
    };

    const newChat = () => { setActiveId(null); setTurns([]); };
    const selectRecent = (id) => { setActiveId(id); setTurns([]); };

    return (
      <div className="app">
        <Sidebar recents={recents} activeId={activeId} onSelect={selectRecent} onNew={newChat}/>
        <main className="main">
          <Topbar/>
          <div className="stream" ref={streamRef}>
            <div className="stream-inner">
              {turns.length === 0
                ? <Welcome onStart={sendMessage}/>
                : turns.map((t, i) => t.role === 'user'
                    ? <UserTurn key={i} text={t.text}/>
                    : <ClaudeTurn key={i} text={t.text} streaming={t.streaming}/>)
              }
            </div>
          </div>
          <Composer onSend={sendMessage}/>
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
